<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇰🇷團購分帳小工具 </title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6 flex justify-center items-start">

<div id="app" class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-3 gap-6">

<!-- ================= 左側略（你原本的不用動） ================= -->

<!-- ================= 右側結算區（只標重點有改） ================= -->

<div v-if="currentProject" class="md:col-span-2 bg-white p-6 rounded-2xl shadow-xl border border-slate-200 flex flex-col gap-6">

  <!-- 原本內容完全保留 -->

  <!-- ===== 結算區 ===== -->
  <div v-if="currentProject.expenses.length > 0 || (currentProject.extraExpenses && currentProject.extraExpenses.length > 0)">

    <button 
      @click="showSettlement = true" 
      class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-bold py-3 rounded-xl text-sm transition shadow-md"
    >
      🚀 開始結算
    </button>

  </div>

  <!-- ===== 結算結果 ===== -->
  <div v-if="showSettlement">

    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-5 rounded-xl border border-indigo-100 shadow-md">

      <h3 class="text-xs font-bold text-indigo-800 mb-3">付款方式</h3>

      <label class="inline-flex items-center gap-2 text-xs mb-3">
        <input type="checkbox" v-model="useSimplifiedPath">
        最少轉帳模式
      </label>

      <ul v-if="settlementResults.length">
        <li v-for="(s,i) in settlementResults" :key="i"
            class="flex justify-between bg-white p-2 rounded mb-2">
          <span>{{ s.from }} → {{ s.to }}</span>
          <span class="font-bold">${{ s.amount }}</span>
        </li>
      </ul>

      <div v-else class="text-green-600 text-sm">已結清</div>

      <!-- ⭐ 新增 LINE 複製按鈕 -->
      <button
        @click="copyLineText"
        class="w-full mt-4 bg-black text-white py-2 rounded-xl text-sm font-bold hover:bg-gray-800"
      >
        📋 一鍵複製 LINE 結算
      </button>

    </div>

    <!-- ⭐ LINE 預覽 -->
    <pre class="mt-3 p-3 bg-slate-900 text-white text-xs rounded-xl whitespace-pre-wrap">
{{ lineSettlementText }}
    </pre>

  </div>

</div>

</div>

<script>
const { createApp, ref, computed } = Vue

createApp({
  setup() {

    const projects = ref([])
    const currentProjectId = ref(null)
    const showSettlement = ref(false)
    const useSimplifiedPath = ref(false)

    /* ====== 核心資料 ====== */
    const currentProject = computed(() =>
      projects.value.find(p => p.id === currentProjectId.value)
    )

    /* ====== 結算（你原本那段保留） ====== */
    const settlementResults = computed(() => {
      if (!currentProject.value) return []

      const balances = {}

      currentProject.value.members.forEach(m => balances[m] = 0)

      currentProject.value.expenses.forEach(exp => {
        balances[exp.payer] += exp.total
        Object.entries(exp.shares).forEach(([n,q]) => {
          balances[n] -= q * exp.price
        })
      })

      const creditors = []
      const debtors = []

      Object.entries(balances).forEach(([n,b]) => {
        if (b > 0) creditors.push({name:n,amount:b})
        else if (b < 0) debtors.push({name:n,amount:-b})
      })

      const result = []

      let i=0,j=0
      while(i<creditors.length && j<debtors.length){
        const c = creditors[i]
        const d = debtors[j]
        const amt = Math.min(c.amount,d.amount)

        result.push({
          from:d.name,
          to:c.name,
          amount:Math.round(amt)
        })

        c.amount -= amt
        d.amount -= amt

        if(c.amount<=0) i++
        if(d.amount<=0) j++
      }

      return result
    })

    /* ====== ⭐ 新增：詳細拆帳 ====== */
    const detailedSettlement = computed(() => {
      if (!currentProject.value) return []

      const out = []

      currentProject.value.expenses.forEach(exp => {
        Object.entries(exp.shares).forEach(([name, qty]) => {
          if (qty > 0 && name !== exp.payer) {
            out.push({
              from: name,
              to: exp.payer,
              amount: qty * exp.price,
              source: exp.desc
            })
          }
        })
      })

      return out
    })

    /* ====== ⭐ LINE 文案 ====== */
    const lineSettlementText = computed(() => {
      if (!currentProject.value) return ''

      let text = `📦 ${currentProject.value.name} 結算\n\n`

      detailedSettlement.value.forEach(f => {
        text += `${f.from} → ${f.to}：${f.amount}（${f.source}）\n`
      })

      text += `\n📊 總結\n`

      const map = {}

      detailedSettlement.value.forEach(f => {
        map[f.from] = (map[f.from] || 0) - f.amount
        map[f.to] = (map[f.to] || 0) + f.amount
      })

      Object.entries(map).forEach(([k,v]) => {
        if (v < 0) text += `${k} 應付 ${Math.abs(v)}\n`
        else if (v > 0) text += `${k} 應收 ${v}\n`
      })

      return text
    })

    /* ====== ⭐ 複製 ====== */
    const copyLineText = async () => {
      await navigator.clipboard.writeText(lineSettlementText.value)
      alert('已複製 LINE 結算 👍')
    }

    return {
      projects,
      currentProjectId,
      currentProject,
      showSettlement,
      useSimplifiedPath,

      settlementResults,
      detailedSettlement,
      lineSettlementText,
      copyLineText
    }
  }
}).mount('#app')
</script>

</body>
</html>
